name: Deploy

on:
  push:
    branches: [main]

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test
      - run: npm audit --audit-level=high --omit=dev
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz
          sudo mv gitleaks /usr/local/bin/
      - name: Gitleaks
        run: gitleaks detect --source . --verbose
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/nextjs
            p/typescript
            p/owasp-top-ten
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: quality
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Apply Supabase migrations
        run: |
          npx supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          npx supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Deploy to Vercel
        run: |
          set -e
          # Crea project.json para que Vercel CLI v50 resuelva el proyecto localmente
          # y no intente detectarlo via GitHub Actions (lo que inyecta --repo internamente)
          mkdir -p .vercel
          jq -n --arg pid "$VERCEL_PROJECT_ID" --arg oid "$VERCEL_ORG_ID" \
            '{"projectId":$pid,"orgId":$oid}' > .vercel/project.json
          npx vercel@50 pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel@50 build --prod --token="$VERCEL_TOKEN"
          npx vercel@50 deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TELEMETRY_DISABLED: 1
